version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
        - cp public/dagens.html public/index.html
    build:
      commands:
        - echo "Static landing page ready"
  artifacts:
    baseDirectory: public
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
